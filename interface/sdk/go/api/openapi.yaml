          type: string
        based_on:
          $ref: '#/components/schemas/ReflectBasedOn'
        structured_output:
          additionalProperties: true
          description: Structured output parsed according to the request's response_schema.
            Only present when response_schema was provided in the request.
          nullable: true
          title: Structured Output
          type: object
        usage:
          $ref: '#/components/schemas/TokenUsage'
        trace:
          $ref: '#/components/schemas/ReflectTrace'
      required:
      - text
      title: ReflectResponse
      type: object
    ReflectToolCall:
