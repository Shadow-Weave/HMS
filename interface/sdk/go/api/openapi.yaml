    MentalModelTrigger-Input:
      description: Trigger settings for a mental model.
      properties:
        mode:
          default: full
          description: "Refresh mode. 'full' (default) regenerates the mental model\
            \ content from scratch on each refresh. 'delta' performs surgical edits\
            \ against the existing content: unchanged sections are preserved byte-for-byte,\
            \ stale content is removed, new content is added. If the mental model\
            \ has no existing content, or if the source_query has changed since the\
            \ last refresh, delta mode falls back to a full regeneration automatically."
          enum:
          - full
          - delta
          title: Mode
          type: string
        refresh_after_consolidation:
          default: false
          description: "If true, refresh this mental model after observations consolidation\
            \ (real-time mode)"
          title: Refresh After Consolidation
          type: boolean
        fact_types:
          description: "Filter which fact types are retrieved during reflect. None\
            \ means all types (world, experience, observation)."
          items:
            enum:
            - world
            - experience
            - observation
            type: string
          nullable: true
          title: Fact Types
          type: array
        exclude_mental_models:
          default: false
          description: "If true, exclude all mental models from the reflect loop (skip\
            \ search_mental_models tool)."
          title: Exclude Mental Models
          type: boolean
        exclude_mental_model_ids:
          description: Exclude specific mental models by ID from the reflect loop.
          items:
            type: string
          nullable: true
          title: Exclude Mental Model Ids
          type: array
        tags_match:
          description: "Override how the model's tags filter memories during refresh.\
            \ If not set, defaults to 'all_strict' when the model has tags (security\
            \ isolation) or 'any' when the model has no tags. Set to 'any' to include\
            \ untagged memories alongside tagged ones during refresh."
          enum:
          - any
          - all
          - any_strict
          - all_strict
          nullable: true
          title: Tags Match
          type: string
        tag_groups:
          description: "Compound boolean tag expressions to use during refresh instead\
            \ of the model's own tags. When set, these tag groups are passed to reflect\
            \ and the model's flat tags are NOT used for filtering. Supports nested\
            \ and/or/not expressions for complex tag-based scoping."
          items:
            $ref: '#/components/schemas/Tag_Groups_inner'
          nullable: true
          title: Tag Groups
          type: array
        include_chunks:
          description: Override whether the internal recall used during refresh returns
            raw chunk text. None means use the bank/global config default (recall_include_chunks).
          nullable: true
          title: Include Chunks
          type: boolean
        recall_max_tokens:
          description: Override the token budget for facts returned by the internal
            recall during refresh. None means use the bank/global config default (recall_max_tokens).
          nullable: true
          title: Recall Max Tokens
          type: integer
        recall_chunks_max_tokens:
          description: Override the token budget for raw chunks returned by the internal
            recall during refresh. None means use the bank/global config default (recall_chunks_max_tokens).
          nullable: true
          title: Recall Chunks Max Tokens
          type: integer
      title: MentalModelTrigger
      type: object
