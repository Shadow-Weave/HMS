        include:
          facts: {}
        max_tokens: 4096
        query: What do you think about artificial intelligence?
        response_schema:
          properties:
            summary:
              type: string
            key_points:
              items:
                type: string
              type: array
          required:
          - summary
          - key_points
          type: object
        tags:
        - user_a
        tags_match: any
      properties:
        query:
          title: Query
          type: string
        budget:
          $ref: '#/components/schemas/Budget'
        context:
          deprecated: true
          description: "DEPRECATED: Additional context is now concatenated with the\
            \ query. Pass context directly in the query field instead. If provided,\
            \ it will be appended to the query for backward compatibility."
          nullable: true
          title: Context
          type: string
        max_tokens:
          default: 4096
          description: Maximum tokens for the response
          title: Max Tokens
          type: integer
        include:
          $ref: '#/components/schemas/ReflectIncludeOptions'
        response_schema:
          additionalProperties: true
          description: "Optional JSON Schema for structured output. When provided,\
            \ the response will include a 'structured_output' field with the LLM response\
            \ parsed according to this schema."
          nullable: true
          title: Response Schema
          type: object
        tags:
          description: "Filter memories by tags during reflection. If not specified,\
            \ all memories are considered."
          items:
            type: string
          nullable: true
          title: Tags
          type: array
        tags_match:
          default: any
          description: "How to match tags: 'any' (OR, includes untagged), 'all' (AND,\
            \ includes untagged), 'any_strict' (OR, excludes untagged), 'all_strict'\
            \ (AND, excludes untagged)."
          enum:
          - any
          - all
          - any_strict
          - all_strict
          title: Tags Match
          type: string
        tag_groups:
          description: "Compound tag filter using boolean groups. Groups in the list\
            \ are AND-ed. Each group is a leaf {tags, match} or compound {and: [...]},\
            \ {or: [...]}, {not: ...}."
          items:
            $ref: '#/components/schemas/Tag_Groups_inner'
          nullable: true
          title: Tag Groups
          type: array
        fact_types:
          description: "Filter which fact types are retrieved during reflect. None\
            \ means all types (world, experience, observation)."
          items:
            enum:
            - world
            - experience
            - observation
            type: string
          nullable: true
          title: Fact Types
          type: array
        exclude_mental_models:
          default: false
          description: "If true, exclude all mental models from the reflect loop (skip\
            \ search_mental_models tool)."
          title: Exclude Mental Models
          type: boolean
        exclude_mental_model_ids:
          description: Exclude specific mental models by ID from the reflect loop.
          items:
            type: string
          nullable: true
          title: Exclude Mental Model Ids
          type: array
      required:
      - query
      title: ReflectRequest
      type: object
    ReflectResponse:
      description: Response model for think endpoint.
      example:
        based_on:
          memories:
          - id: "123"
            text: AI is used in healthcare
            type: world
          - id: "456"
            text: I discussed AI applications last week
            type: experience
        structured_output:
          key_points:
          - Used in healthcare
          - Discussed recently
          summary: AI is transformative
        text: |-
          ## AI Overview

          Based on my understanding, AI is a **transformative technology**:

          - Used extensively in healthcare
          - Discussed in recent conversations
          - Continues to evolve rapidly
        trace:
          llm_calls:
          - duration_ms: 1200
            scope: agent_1
          observations:
          - id: obs-1
            name: AI Technology
            subtype: structural
            type: concept
          tool_calls:
          - duration_ms: 150
            input:
              query: AI
            tool: recall
        usage:
          input_tokens: 1500
          output_tokens: 500
          total_tokens: 2000
      properties:
        text:
